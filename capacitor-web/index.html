<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07110d" />
    <title>AcreX</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07110d;
        color: #f4f7f5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #07110d;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        color: #aebcb4;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AcreX</h1>
      <p>Set CAPACITOR_SERVER_URL to the deployed AcreX application URL before syncing the iOS app.</p>
    </main>
  </body>
</html>
